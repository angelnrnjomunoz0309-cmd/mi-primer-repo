name: Automatización Programada y Manual

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: 

jobs:
  ejecutar-script:
    runs-on: ubuntu-latest
    name: Ejecutar workflow_report.py

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Correr el script
        run: python workflow_report.py